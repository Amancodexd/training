<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body style="background-color : rgb(219, 121, 180)">

    
    <div>                  
    
    <h1>ordered list</h1>
    <ol>
        <li>Apple</li>
        <li>orange</li>
        <li>mango</li>
    </ol>
    </div>

    <div>
    <h1>Unordered list</h1>
    <ul>
        <li>Apple</li>
        <li>orange</li>
        <li>mango</li>
    </ul>
    </div>
    <div>
    <h1>Descriptive list</h1>
    <dl>
        <dt>this are famous cats name</dt><!--data tile -->
        <dd>kallu badmos<br>chota don<br>kunfu cat</dd><!--descriptive data-->
        <dt>where are we </dt>
        <dd>we are in nepal</dd>
    </dl>
    </div>
     
</body>
</html>
