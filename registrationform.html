<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>

<body style="background-color: pink;">
    <form>

        <h1>Registration Form</h1>

        <label>Full Name: </label>

        <input type="textbox" name="name" id="name" style="width: 30%;"><br><br>

        <label>Email:</label>

        <input type="email" name="mail" id="mail" style="width: 30%;"><br><br>
        <label>Phone Number:</label>

        <input type="tel" name="Number" id="Number" style="width: 30%;"><br><br>


        <label>Password</label>

        <input type="password" name="pass" id="pass" style="width: 20%;"> <br><br>


        <label>Gender</label><br>
        <input type="radio" name="gender" id="male"> male <br>
        <input type="radio" name="gender" id="female"> female <br>
        <input type="radio" name="gender" id="other"> other <br>
        <br>
        <label>DOB</label><br><br>

        <input type="date" name="datetime"><br><br>
        <label>
            <label>Subject</label><br>
            <input type="checkbox" name="subject" id="">HTML <br>
            <input type="checkbox" name="subject" id="">CSS <br>
            <input type="checkbox" name="subject" id="">JS <br>
        </label>
        <label>Select Your Semester</label><br>
        <select name="" id="">
            <option value="1">1 Semester</option>
            <option value="2">2 Semester</option>
            <option value="3">3 Semester</option>
            <option value="4">4 Semester</option>
            <option value="5">5 Semester</option>
            <option value="6">6 Semester</option>
        </select><br><br>
        <label>Country</label><br>
        <select name="" id="">
            <option value="1">Nepal</option>
            <option value="2">India</option>
            <option value="3">China</option>
            <option value="4">Bhutan</option>
            <option value="5">Bangladesh</option>

        </select><br><br>
        <label>Address:</label><br>
        <textarea name="" id=""></textarea>


        <input type="submit" value="submit">
    </form>

</body>

</html>
