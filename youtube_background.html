<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Background Video Demo 🌟</title>
    <!-- Modern Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* Modern Design System & Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            color: #ffffff;
            overflow: hidden; /* Prevent scrolling during full screen */
            background-color: #000; /* Fallback background */
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- YOUTUBE VIDEO BACKGROUND --- */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2; /* Place behind everything */
            overflow: hidden;
            pointer-events: none; /* Allows clicks to pass through */
        }

        /* 
           This CSS trick scales and positions the iframe to cover the screen 
           exactly like "object-fit: cover" for images, regardless of screen aspect ratio.
        */
        .video-container iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 56.25vw; /* 16:9 Aspect Ratio (9 / 16 = 0.5625) */
            min-height: 100vh;
            min-width: 177.77vh; /* 16:9 Aspect Ratio (16 / 9 = 1.7777) */
            transform: translate(-50%, -50%) scale(1.15); /* Center & scale slightly to hide YouTube branding/borders */
        }

        /* --- TRANSPARENT OVERLAY (Vignette) --- */
        /* 
           Since there is NO background box on the text, we add a subtle full-screen 
           radial gradient to slightly darken the edges. This keeps the video fully visible 
           while drastically improving text legibility.
        */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
        }

        /* --- CONTENT LAYER (No background container) --- */
        .content {
            text-align: center;
            padding: 20px;
            max-width: 800px;
            animation: fadeIn 1.5s ease-out;
        }

        /* 
           Crucial CSS for text overlaying videos:
           - Large bold font.
           - Text-shadow: gives a subtle dark outline so letters are visible even 
             if the video background gets bright white.
        */
        .content h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            line-height: 1.1;
            /* High-legibility text shadow */
            text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.7), 
                         0 0 20px rgba(0, 0, 0, 0.5);
            background: linear-gradient(to right, #ffffff, #e0e0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .content p {
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            font-weight: 400;
            margin-bottom: 35px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 1px 2px 8px rgba(0, 0, 0, 0.8);
            line-height: 1.6;
        }

        /* --- PREMIUM BUTTON DESIGN --- */
        .cta-btn {
            display: inline-block;
            padding: 15px 35px;
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .cta-btn:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }

        .cta-btn:active {
            transform: translateY(-1px);
        }

        /* Entry Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- YouTube Background Video Container -->
    <div class="video-container">
        <!-- 
           YouTube Embed Query parameters explained:
           - autoplay=1        : Starts the video immediately
           - mute=1            : Mutes the video (Required by browsers to allow autoplay)
           - controls=0        : Hides YouTube player controls
           - loop=1            : Loops the video
           - playlist=ScMzIvxBSi4 : Required by YouTube to loop the video
           - playsinline=1     : Prevents mobile devices from opening fullscreen player
           - rel=0             : Hides related videos at the end
        -->
        <iframe 
            src="https://www.youtube.com/embed/ScMzIvxBSi4?autoplay=1&mute=1&controls=0&loop=1&playlist=ScMzIvxBSi4&playsinline=1&rel=0" 
            frameborder="0" 
            allow="autoplay; encrypted-media" 
            allowfullscreen>
        </iframe>
    </div>

    <!-- Vignette Overlay for readability -->
    <div class="overlay"></div>

    <!-- Content (No background box around the container) -->
    <main class="content">
        <h1>Dynamic Floating Text</h1>
        <p>This layout uses a full-screen YouTube video background. The text floats directly on the video without any blocky background, relying instead on clean, high-contrast text shadows and a subtle vignette overlay for absolute readability.</p>
        <a href="#" class="cta-btn">Explore More</a>
    </main>

</body>
</html>
