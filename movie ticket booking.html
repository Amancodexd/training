<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Tickert Booking Form</title>
</head>

<body style="background-color: rgb(148, 150, 255);">
    <label style="font-size: xx-large; font-weight: bold; color: black;">Movie Ticket Booking form</label><br><br><br>

    <form>
        <label>Select Movie</label>
        <select style="color: red;">

            <option value="">Interstellar-2D (3h2m)</option>
            <option value="">The Lord of the Rings: The Return of the King-4k-3h21m</option>
            <option value="">The Dark Knight - 2D - 2h 32m</option>
            <option value="">inception- 3D - 2h 28m</option>
            <option value="">Oppenheimer - 3D - 3h</option>
            <option value="">Spider-Man Brand New day -3D-2h</option>
        </select><br><br>
        <label>Select Show Time</label>
        <select style="color: royalblue;">
            <option value="">Morning-7:00</option>
            <option value="">Afternoon-12:00</option>
            <option value="">Evening-5:00</option>
            <option value="">Night-10:00</option>
        </select><br><br>
        <label>Select Number of Tickets:</label>
        <select>
            <option value="">1</option>
            <option value="">2</option>
            <option value="">3</option>
            <option value="">4</option>
            <option value="">5</option>
            <option value="">6</option>
            <option value="">7</option>
            <option value="">8</option>
            <option value="">9</option>
            <option value="">10</option>

        </select><br><br>
        <label>Choose Snacks</label><br><br>
        <input type="checkbox" value="">Popcorn <br>
        <input type="checkbox" value="">Coke <br>
        <input type="checkbox" value="">French Fries <br><br>

        <label>Payment Method</label><br>
        <select>
            <optionvalue="">Cash</option>
                <option value="">Khalti</option>
                <option value="">Esewa</option>
                <option value="">Fonepay</option>
                <option value="">Cash</option>

        </select><br><br>

        <input type="submit" value="Book Ticket">
    </form>

</body>

</html>
