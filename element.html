<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>block vs inline</title>
</head>

<body>
    <div style="color: aquamarine;background-color: darkblue;">this is block</div><!---this take whole block-->
    <div style="background-color: bisque;">this is block</div>
    <span style="color: rgb(132, 184, 117);background-color: darkblue;">this is 1 inline element</span>
    <span style="color: rgb(127, 172, 172);background-color: rgb(227, 99, 30);">this is 2 inline element</span>
    <!--this takes block only where the text is ended.not full-->
</body>

</html>
